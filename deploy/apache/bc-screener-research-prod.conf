# Apache configuration for bc-screener-research.tanuh.ai
# Purpose: Reverse proxy for the questionnaire app running on localhost:3000/3001

<VirtualHost *:80>
  ServerName bc-screener-research.tanuh.ai
  ServerAdmin ashwin.mecon@gmail.com

  # Redirect all HTTP traffic to HTTPS
  RewriteEngine On
  RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
  RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

  # Logs
  ErrorLog  ${APACHE_LOG_DIR}/bc-screener-research-error.log
  CustomLog ${APACHE_LOG_DIR}/bc-screener-research-access.log combined
</VirtualHost>

<VirtualHost *:443>
  ServerName bc-screener-research.tanuh.ai
  ServerAdmin ashwin.mecon@gmail.com

  SSLEngine on
  # Adjust certificate paths to your Let's Encrypt locations
  SSLCertificateFile    /etc/letsencrypt/live/bc-screener-research.tanuh.ai/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/bc-screener-research.tanuh.ai/privkey.pem

  # Security headers
  Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains" env=HTTPS
  Header always set X-Content-Type-Options nosniff
  Header always set Content-Security-Policy "frame-ancestors 'self' https://tanuh.ai https://www.tanuh.ai https://app.tanuh.ai https://research.tanuh.ai https://reports.tanuh.ai"
  Header always set Referrer-Policy no-referrer-when-downgrade
  Header always set X-XSS-Protection "1; mode=block"

  AllowEncodedSlashes NoDecode
  ProxyPreserveHost On
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Host "bc-screener-research.tanuh.ai"

  # 1. API: Point to Backend container on port 3001
  # Use 127.0.0.1 to reach the Docker-mapped port on the host
  ProxyPass        /api http://127.0.0.1:3001/api connectiontimeout=5 timeout=60 keepalive=On
  ProxyPassReverse /api http://127.0.0.1:3001/api

  # 2. Frontend: Point to Frontend container on port 3000
  # From your docker-compose.yml mapping: frontend: ports: - "3000:80"
  ProxyPass        / http://127.0.0.1:3000/ connectiontimeout=5 timeout=60 keepalive=On
  ProxyPassReverse / http://127.0.0.1:3000/

  # Fix for Cookies and Redirects
  ProxyPassReverseCookieDomain 127.0.0.1 bc-screener-research.tanuh.ai
  ProxyPassReverseCookiePath / /

  ErrorLog  ${APACHE_LOG_DIR}/bc-screener-research-ssl-error.log
  CustomLog ${APACHE_LOG_DIR}/bc-screener-research-ssl-access.log combined
</VirtualHost>
