# Exclude docker healthcheck requests from access logs
# Match the exact User-Agent we send from the HEALTHCHECK
SetEnvIfNoCase User-Agent "^docker-healthcheck$" dontlog

# Log everything except requests flagged with dontlog
CustomLog "logs/access_log" combined env=!dontlog

<IfModule mod_proxy.c>
    ProxyPass /api http://backend:3001/api
    ProxyPassReverse /api http://backend:3001/api
</IfModule>
